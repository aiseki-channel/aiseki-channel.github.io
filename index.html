<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="相席ちゃんねる">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#0d0d0f">
  <title>相席ちゃんねる</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --card: #1a1a1f;
      --card2: #141418;
      --border: #2a2a35;
      --men: #4a9eff;
      --women: #ff6b9d;
      --text: #f0f0f5;
      --sub: #888899;
      --green: #3ddc84;
      --red: #ff4d4d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex;
      flex-direction: column;
    }

    header { text-align: center; padding: 20px 16px 8px; }
    header h1 { font-size: 15px; font-weight: 600; color: var(--sub); letter-spacing: 0.08em; text-transform: uppercase; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 12px 16px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .venue-name { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--sub);
      flex-shrink: 0;
    }
    .status-dot.open  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.error { background: var(--red); }

    .counts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .count-box {
      background: var(--bg);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
    }

    .count-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .count-label.men   { color: var(--men); }
    .count-label.women { color: var(--women); }

    .count-number {
      font-size: 48px; font-weight: 800;
      line-height: 1; font-variant-numeric: tabular-nums;
    }
    .count-number.men    { color: var(--men); }
    .count-number.women  { color: var(--women); }
    .count-number.loading { color: var(--sub); font-size: 36px; }

    .bar-wrap  { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bar-inner { height: 100%; border-radius: 3px; transition: width 0.5s ease; width: 0; }
    .bar-inner.men   { background: var(--men); }
    .bar-inner.women { background: var(--women); }

    .ratio-row { display: flex; gap: 6px; }
    .ratio-row .bar-wrap { flex: 1; }

    .card-footer { font-size: 11px; color: var(--sub); text-align: right; }

    .error-msg { font-size: 13px; color: var(--red); text-align: center; padding: 8px 0; }

    /* Sound Park — sub-store rows */
    .sp-stores { display: flex; flex-direction: column; gap: 10px; }

    .sp-store {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sp-store-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sp-store-name { font-size: 13px; font-weight: 600; color: var(--text); }

    .sp-counts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .sp-count-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }

    .sp-count-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 4px;
    }
    .sp-count-label.men   { color: var(--men); }
    .sp-count-label.women { color: var(--women); }

    .sp-count-number {
      font-size: 32px; font-weight: 800;
      line-height: 1; font-variant-numeric: tabular-nums;
    }
    .sp-count-number.men    { color: var(--men); }
    .sp-count-number.women  { color: var(--women); }
    .sp-count-number.loading { color: var(--sub); font-size: 24px; }

    footer {
      text-align: center;
      padding: 0 16px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }

    .refresh-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-size: 14px; font-weight: 600;
      padding: 10px 28px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .refresh-btn:active  { opacity: 0.6; }
    .refresh-btn:disabled { opacity: 0.4; }

    .last-updated { font-size: 11px; color: var(--sub); }
  </style>
</head>
<body>

<header>
  <h1>相席ちゃんねる — 福岡</h1>
</header>

<main>
  <!-- JIS -->
  <div class="card" id="jis-card">
    <div class="card-header">
      <span class="venue-name">JIS FUKUOKA</span>
      <span class="status-dot" id="jis-dot"></span>
    </div>
    <div class="counts">
      <div class="count-box">
        <div class="count-label men">MEN</div>
        <div class="count-number men loading" id="jis-men">—</div>
      </div>
      <div class="count-box">
        <div class="count-label women">WOMEN</div>
        <div class="count-number women loading" id="jis-women">—</div>
      </div>
    </div>
    <div class="ratio-row">
      <div class="bar-wrap"><div class="bar-inner men" id="jis-bar-men"></div></div>
      <div class="bar-wrap"><div class="bar-inner women" id="jis-bar-women"></div></div>
    </div>
    <div class="card-footer" id="jis-time"></div>
    <div class="error-msg" id="jis-error" style="display:none"></div>
  </div>

  <!-- Oriental Lounge -->
  <div class="card" id="ol-card">
    <div class="card-header">
      <span class="venue-name">オリエンタルラウンジ 福岡</span>
      <span class="status-dot" id="ol-dot"></span>
    </div>
    <div class="counts">
      <div class="count-box">
        <div class="count-label men">MEN</div>
        <div class="count-number men loading" id="ol-men">—</div>
      </div>
      <div class="count-box">
        <div class="count-label women">WOMEN</div>
        <div class="count-number women loading" id="ol-women">—</div>
      </div>
    </div>
    <div class="ratio-row">
      <div class="bar-wrap"><div class="bar-inner men" id="ol-bar-men"></div></div>
      <div class="bar-wrap"><div class="bar-inner women" id="ol-bar-women"></div></div>
    </div>
    <div class="card-footer" id="ol-time"></div>
    <div class="error-msg" id="ol-error" style="display:none"></div>
  </div>

  <!-- Sound Park 相席カラオケパーク -->
  <div class="card" id="sp-card">
    <div class="card-header">
      <span class="venue-name">相席カラオケパーク</span>
      <span class="status-dot" id="sp-dot"></span>
    </div>
    <div class="sp-stores">
      <!-- 天神西通り店 -->
      <div class="sp-store" id="sp-nishidori">
        <div class="sp-store-header">
          <span class="sp-store-name">天神西通り店</span>
        </div>
        <div class="sp-counts">
          <div class="sp-count-box">
            <div class="sp-count-label men">MEN</div>
            <div class="sp-count-number men loading" id="sp-nishidori-men">—</div>
          </div>
          <div class="sp-count-box">
            <div class="sp-count-label women">WOMEN</div>
            <div class="sp-count-number women loading" id="sp-nishidori-women">—</div>
          </div>
        </div>
        <div class="ratio-row">
          <div class="bar-wrap"><div class="bar-inner men" id="sp-nishidori-bar-men"></div></div>
          <div class="bar-wrap"><div class="bar-inner women" id="sp-nishidori-bar-women"></div></div>
        </div>
      </div>
      <!-- 天神親不孝通り店 -->
      <div class="sp-store" id="sp-tenjin-oyafukodori">
        <div class="sp-store-header">
          <span class="sp-store-name">天神親不孝通り店</span>
        </div>
        <div class="sp-counts">
          <div class="sp-count-box">
            <div class="sp-count-label men">MEN</div>
            <div class="sp-count-number men loading" id="sp-tenjin-oyafukodori-men">—</div>
          </div>
          <div class="sp-count-box">
            <div class="sp-count-label women">WOMEN</div>
            <div class="sp-count-number women loading" id="sp-tenjin-oyafukodori-women">—</div>
          </div>
        </div>
        <div class="ratio-row">
          <div class="bar-wrap"><div class="bar-inner men" id="sp-tenjin-oyafukodori-bar-men"></div></div>
          <div class="bar-wrap"><div class="bar-inner women" id="sp-tenjin-oyafukodori-bar-women"></div></div>
        </div>
      </div>
      <!-- 西新店 -->
      <div class="sp-store" id="sp-nishijin">
        <div class="sp-store-header">
          <span class="sp-store-name">西新店</span>
        </div>
        <div class="sp-counts">
          <div class="sp-count-box">
            <div class="sp-count-label men">MEN</div>
            <div class="sp-count-number men loading" id="sp-nishijin-men">—</div>
          </div>
          <div class="sp-count-box">
            <div class="sp-count-label women">WOMEN</div>
            <div class="sp-count-number women loading" id="sp-nishijin-women">—</div>
          </div>
        </div>
        <div class="ratio-row">
          <div class="bar-wrap"><div class="bar-inner men" id="sp-nishijin-bar-men"></div></div>
          <div class="bar-wrap"><div class="bar-inner women" id="sp-nishijin-bar-women"></div></div>
        </div>
      </div>
    </div>
    <div class="card-footer" id="sp-time"></div>
    <div class="error-msg" id="sp-error" style="display:none"></div>
  </div>
</main>

<footer>
  <button class="refresh-btn" id="refresh-btn" onclick="fetchAll()">更新</button>
  <div class="last-updated" id="last-updated"></div>
</footer>

<script>
  const JIS_WORKER_URL = 'https://jis.aisekichannel.workers.dev';
  const OL_WORKER_URL  = 'https://ol.aisekichannel.workers.dev';
  const SP_WORKER_URL  = 'https://soundpark.aisekichannel.workers.dev';

  const AUTO_REFRESH_MS = 1 * 60 * 1000;

  function setBar(id, val, max) {
    const pct = max > 0 ? Math.min(100, Math.round(val / max * 100)) : 0;
    document.getElementById(id).style.width = pct + '%';
  }

  function fmtTime() {
    return new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  }

  async function fetchJIS() {
    const dot = document.getElementById('jis-dot');
    const errEl = document.getElementById('jis-error');
    errEl.style.display = 'none';
    dot.className = 'status-dot';
    try {
      const r = await fetch(JIS_WORKER_URL, { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      const men = parseInt(d.men) || 0, women = parseInt(d.women) || 0;
      document.getElementById('jis-men').textContent = men;
      document.getElementById('jis-women').textContent = women;
      document.getElementById('jis-men').classList.remove('loading');
      document.getElementById('jis-women').classList.remove('loading');
      const max = Math.max(men, women, 1);
      setBar('jis-bar-men', men, max);
      setBar('jis-bar-women', women, max);
      dot.classList.add('open');
      document.getElementById('jis-time').textContent = fmtTime() + ' 時点';
    } catch (e) {
      dot.classList.add('error');
      errEl.textContent = '取得できませんでした';
      errEl.style.display = 'block';
    }
  }

  async function fetchOL() {
    const dot = document.getElementById('ol-dot');
    const errEl = document.getElementById('ol-error');
    errEl.style.display = 'none';
    dot.className = 'status-dot';
    try {
      const r = await fetch(OL_WORKER_URL, { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      const men = parseInt(d.men) || 0, women = parseInt(d.women) || 0;
      document.getElementById('ol-men').textContent = men;
      document.getElementById('ol-women').textContent = women;
      document.getElementById('ol-men').classList.remove('loading');
      document.getElementById('ol-women').classList.remove('loading');
      const max = Math.max(men, women, 1);
      setBar('ol-bar-men', men, max);
      setBar('ol-bar-women', women, max);
      dot.classList.add('open');
      document.getElementById('ol-time').textContent = fmtTime() + ' 時点';
    } catch (e) {
      dot.classList.add('error');
      errEl.textContent = '取得できませんでした';
      errEl.style.display = 'block';
    }
  }

  async function fetchSP() {
    const dot = document.getElementById('sp-dot');
    const errEl = document.getElementById('sp-error');
    errEl.style.display = 'none';
    dot.className = 'status-dot';
    try {
      const r = await fetch(SP_WORKER_URL, { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      let anyOk = false;
      for (const store of d.stores) {
        if (store.error) continue;
        anyOk = true;
        const men = store.men ?? 0, women = store.women ?? 0;
        const sid = 'sp-' + store.id;
        const menEl = document.getElementById(sid + '-men');
        const womenEl = document.getElementById(sid + '-women');
        if (menEl) { menEl.textContent = men; menEl.classList.remove('loading'); }
        if (womenEl) { womenEl.textContent = women; womenEl.classList.remove('loading'); }
        const max = Math.max(men, women, 1);
        setBar(sid + '-bar-men', men, max);
        setBar(sid + '-bar-women', women, max);
      }
      if (anyOk) {
        dot.classList.add('open');
        document.getElementById('sp-time').textContent = fmtTime() + ' 時点';
      } else {
        throw new Error('all stores failed');
      }
    } catch (e) {
      dot.classList.add('error');
      errEl.textContent = '取得できませんでした';
      errEl.style.display = 'block';
    }
  }

  async function fetchAll() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '⟳ 更新中...';
    await Promise.all([fetchJIS(), fetchOL(), fetchSP()]);
    document.getElementById('last-updated').textContent = '最終更新: ' + fmtTime();
    btn.disabled = false;
    btn.textContent = '更新';
  }

  fetchAll();
  setInterval(fetchAll, AUTO_REFRESH_MS);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
